<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF8F3;
    --warm-white: #FFFEF9;
    --sage: #6B8C6B;
    --sage-light: #E8F0E8;
    --sage-dark: #3D5C3D;
    --terracotta: #C4724A;
    --terracotta-light: #F5EBE4;
    --terracotta-dark: #8B4F32;
    --ink: #2C2B28;
    --ink-mid: #5C5A55;
    --ink-soft: #9C9A94;
    --border: #E0DDD6;
    --card-bg: #FFFEF9;
    --shadow: 0 2px 16px rgba(44,43,40,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
  header { background: var(--ink); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--cream); letter-spacing: 0.5px; }
  .logo span { color: var(--terracotta); }
  nav { display: flex; gap: 4px; }
  .nav-btn { background: none; border: none; color: var(--ink-soft); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px; }
  .nav-btn:hover { background: rgba(255,255,255,0.08); color: var(--cream); }
  .nav-btn.active { background: var(--terracotta); color: white; }
  .page { display: none; padding: 2rem 1.5rem; max-width: 960px; margin: 0 auto; }
  .page.active { display: block; }
  .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.5rem; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--ink); }
  .section-sub { font-size: 0.82rem; color: var(--ink-soft); margin-top: 2px; }
  .btn-primary { background: var(--terracotta); color: white; border: none; padding: 9px 18px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .btn-primary:hover { background: var(--terracotta-dark); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary { background: white; color: var(--ink); border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-secondary:hover { border-color: var(--ink-mid); }
  .btn-danger { background: none; color: #c0392b; border: 1px solid #e8c4c1; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .btn-danger:hover { background: #fdf0ef; }
  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
  .recipe-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.2rem; cursor: pointer; transition: box-shadow 0.15s, transform 0.12s, border-color 0.15s; display: flex; flex-direction: column; gap: 8px; }
  .recipe-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); border-color: var(--sage); }
  .recipe-card-emoji { font-size: 1.6rem; line-height: 1; }
  .recipe-card-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--ink); line-height: 1.3; }
  .recipe-card-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag { background: var(--sage-light); color: var(--sage-dark); font-size: 0.72rem; font-weight: 500; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.2px; }
  .tag.terracotta { background: var(--terracotta-light); color: var(--terracotta-dark); }
  .recipe-card-actions { display: flex; gap: 6px; margin-top: 4px; }
  .btn-sm { font-size: 0.75rem; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: white; color: var(--ink-mid); cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.12s; }
  .btn-sm:hover { border-color: var(--sage); color: var(--sage-dark); }
  .planner-layout { display: grid; grid-template-columns: 1fr 280px; gap: 1.5rem; align-items: start; }
  @media (max-width: 700px) { .planner-layout { grid-template-columns: 1fr; } }
  .week-slots { display: flex; flex-direction: column; gap: 0.6rem; }
  .day-row { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; display: flex; align-items: center; gap: 1rem; transition: border-color 0.15s; }
  .day-row.has-recipe { border-color: var(--sage); }
  .day-label { font-size: 0.8rem; font-weight: 500; color: var(--ink-soft); width: 32px; flex-shrink: 0; letter-spacing: 0.3px; }
  .day-select { flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; color: var(--ink); background: white; cursor: pointer; outline: none; transition: border-color 0.15s; }
  .day-select:focus { border-color: var(--sage); }
  .day-view-btn { background: none; border: none; color: var(--sage); cursor: pointer; font-size: 1rem; padding: 4px; border-radius: 4px; transition: opacity 0.15s; line-height: 1; }
  .day-view-btn:hover { opacity: 0.7; }
  .grocery-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; position: sticky; top: 76px; }
  .grocery-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .grocery-count { background: var(--terracotta); color: white; font-size: 0.72rem; font-weight: 500; padding: 1px 7px; border-radius: 20px; font-family: 'DM Sans', sans-serif; }
  .grocery-item { font-size: 0.85rem; color: var(--ink); padding: 5px 0; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; border-bottom: 1px solid rgba(0,0,0,0.04); }
  .grocery-item.checked { text-decoration: line-through; color: var(--ink-soft); }
  .grocery-check { width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.12s; font-size: 0.7rem; }
  .grocery-item.checked .grocery-check { background: var(--sage); border-color: var(--sage); color: white; }
  .grocery-empty { font-size: 0.85rem; color: var(--ink-soft); text-align: center; padding: 1.5rem 0; line-height: 1.6; }
  .grocery-actions { margin-top: 1rem; display: flex; flex-direction: column; gap: 6px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(44,43,40,0.55); z-index: 500; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--cream); border-radius: 16px; width: 100%; max-width: 640px; padding: 2rem; position: relative; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--ink-mid); line-height: 1; padding: 4px 8px; border-radius: 6px; transition: background 0.12s; }
  .modal-close:hover { background: var(--border); }
  .modal-emoji { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 0.3rem; }
  .modal-section { margin-top: 1.5rem; }
  .modal-section-title { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 0.75rem; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .ingredient-list { list-style: none; }
  .ingredient-list li { padding: 5px 0; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(0,0,0,0.04); }
  .ingredient-list li::before { content: ''; width: 5px; height: 5px; background: var(--terracotta); border-radius: 50%; flex-shrink: 0; }
  .step-list { list-style: none; counter-reset: steps; }
  .step-list li { counter-increment: steps; padding: 0.75rem 0 0.75rem 2.5rem; font-size: 0.9rem; line-height: 1.6; position: relative; border-bottom: 1px solid rgba(0,0,0,0.04); }
  .step-list li::before { content: counter(steps); position: absolute; left: 0; top: 0.75rem; background: var(--ink); color: white; width: 20px; height: 20px; border-radius: 50%; font-size: 0.7rem; font-weight: 500; display: flex; align-items: center; justify-content: center; }
  .form-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
  .form-group { margin-bottom: 1.1rem; }
  label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--ink-mid); margin-bottom: 5px; letter-spacing: 0.2px; }
  input[type=text], select, textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--ink); background: white; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--sage); }
  textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .dynamic-list { display: flex; flex-direction: column; gap: 6px; }
  .dynamic-item { display: flex; gap: 6px; }
  .dynamic-item input, .dynamic-item textarea { flex: 1; }
  .remove-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 0 10px; cursor: pointer; color: var(--ink-soft); font-size: 1.1rem; line-height: 1; transition: all 0.12s; }
  .remove-btn:hover { border-color: #c0392b; color: #c0392b; }
  .add-field-btn { background: none; border: 1px dashed var(--border); border-radius: 8px; padding: 8px; cursor: pointer; color: var(--sage); font-size: 0.82rem; font-weight: 500; font-family: 'DM Sans', sans-serif; width: 100%; transition: all 0.15s; margin-top: 8px; }
  .add-field-btn:hover { border-color: var(--sage); background: var(--sage-light); }
  .form-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; align-items: center; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--ink-soft); }
  .empty-state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--ink); margin-bottom: 0.4rem; }
  .empty-state p { font-size: 0.88rem; line-height: 1.6; }
  .search-bar { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; align-items: center; }
  .search-input { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; background: white; outline: none; transition: border-color 0.15s; color: var(--ink); }
  .search-input:focus { border-color: var(--sage); }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--ink); color: white; padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; opacity: 0; transition: opacity 0.2s; z-index: 9999; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } header { padding: 0 1rem; } .nav-btn { padding: 5px 8px; font-size: 0.75rem; } }
</style>
</head>
<body>

<header>
  <div class="logo">Our <span>Kitchen</span></div>
  <nav>
    <button class="nav-btn active" onclick="showPage('library')">Recipes</button>
    <button class="nav-btn" onclick="showPage('planner')">This Week</button>
    <button class="nav-btn" onclick="showPage('grocery')">Groceries</button>
    <button class="nav-btn" onclick="showPage('add')">+ Add</button>
  </nav>
</header>

<!-- LIBRARY -->
<div id="page-library" class="page active">
  <div class="section-header">
    <div>
      <div class="section-title">Recipe Library</div>
      <div class="section-sub" id="recipe-count-label"></div>
    </div>
  </div>
  <div class="search-bar">
    <input class="search-input" type="text" placeholder="Search by name or cuisine..." id="search-input" oninput="renderLibrary()">
  </div>
  <div class="recipe-grid" id="recipe-grid"></div>
</div>

<!-- PLANNER -->
<div id="page-planner" class="page">
  <div class="section-header">
    <div>
      <div class="section-title">This Week</div>
      <div class="section-sub">Pick what you're cooking each night</div>
    </div>
  </div>
  <div class="planner-layout">
    <div class="week-slots" id="week-slots"></div>
    <div class="grocery-panel">
      <div class="grocery-title">
        Grocery List
        <span class="grocery-count" id="grocery-count-badge">0</span>
      </div>
      <div id="grocery-mini-list"></div>
      <div class="grocery-actions">
        <button class="btn-primary" onclick="showPage('grocery')" style="width:100%">View Full List →</button>
        <button class="btn-secondary" onclick="clearWeek()" style="width:100%;font-size:0.8rem;">Clear Week</button>
      </div>
    </div>
  </div>
</div>

<!-- GROCERY -->
<div id="page-grocery" class="page">
  <div class="section-header">
    <div>
      <div class="section-title">Grocery List</div>
      <div class="section-sub" id="grocery-week-summary"></div>
    </div>
    <button class="btn-secondary" onclick="printGrocery()">🖨 Print</button>
  </div>
  <div id="grocery-full-content"></div>
</div>

<!-- ADD / EDIT -->
<div id="page-add" class="page">
  <div class="section-header">
    <div class="section-title" id="form-page-title">Add a Recipe</div>
  </div>
  <div class="form-card">
    <input type="hidden" id="edit-id">
    <div class="form-row">
      <div class="form-group">
        <label>Recipe Name</label>
        <input type="text" id="f-name" placeholder="e.g. Chicken Stir Fry">
      </div>
      <div class="form-group">
        <label>Emoji</label>
        <input type="text" id="f-emoji" placeholder="🍽️" maxlength="4" style="max-width:90px">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Cuisine / Category</label>
        <input type="text" id="f-category" placeholder="e.g. Italian, Mexican">
      </div>
      <div class="form-group">
        <label>Cook Time</label>
        <input type="text" id="f-time" placeholder="e.g. 30 min">
      </div>
    </div>
    <div class="form-group">
      <label>Notes (optional)</label>
      <input type="text" id="f-notes" placeholder="e.g. Great for meal prep, kids love this">
    </div>
  </div>
  <div class="form-card">
    <div class="modal-section-title" style="margin-bottom:0.75rem">Ingredients</div>
    <div class="dynamic-list" id="ingredients-list"></div>
    <button class="add-field-btn" onclick="addIngredient('')">+ Add Ingredient</button>
  </div>
  <div class="form-card">
    <div class="modal-section-title" style="margin-bottom:0.75rem">Step-by-Step Instructions</div>
    <div class="dynamic-list" id="steps-list"></div>
    <button class="add-field-btn" onclick="addStep('')">+ Add Step</button>
  </div>
  <div class="form-actions">
    <button class="btn-primary" onclick="saveRecipe()">Save Recipe</button>
    <button class="btn-secondary" onclick="cancelEdit()">Cancel</button>
    <button class="btn-danger" id="delete-btn" onclick="deleteRecipe()" style="display:none;margin-left:auto">Delete Recipe</button>
  </div>
</div>

<!-- RECIPE MODAL -->
<div class="modal-overlay" id="recipe-modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_RECIPES = [
  { id:'r1', name:'Taco Bowl', emoji:'🌮', category:'Mexican', time:'30 min', notes:'Crowd pleaser, easy to customize', ingredients:['1 lb ground beef or chicken','1 cup white rice','1 can (15oz) black beans, drained','1 cup corn (fresh or frozen)','2 roma tomatoes, diced','1 avocado, sliced','Shredded cheddar cheese','1/2 cup sour cream','1/4 cup salsa','1 lime','Fresh cilantro','Taco seasoning packet','Olive oil, salt & pepper'], steps:['Cook rice according to package directions.','Heat oil in a skillet over medium-high heat. Add ground beef and cook until browned, about 8 minutes. Drain excess fat.','Add taco seasoning and 1/4 cup water to the meat. Stir and simmer 3-4 minutes until sauce thickens.','Warm black beans in a small saucepan with a pinch of cumin and salt.','Warm corn in the skillet or microwave.','Assemble bowls: rice first, then meat, beans, corn, tomatoes, and avocado.','Top with cheese, sour cream, salsa, a squeeze of lime, and fresh cilantro.'] },
  { id:'r2', name:'Teriyaki Salmon Bowl', emoji:'🍣', category:'Japanese', time:'33 min', notes:'Healthy, fresh & quick', ingredients:['5 salmon fillets (about 6 oz each)','2 cups jasmine rice','1 avocado, sliced','1 cup frozen edamame, thawed','1 mango, diced','1 cucumber, sliced','3 green onions, chopped','Fresh cilantro','Sriracha mayo (mayo + sriracha to taste)','Teriyaki sauce: 1/3 cup soy sauce, 1/4 cup brown sugar, 1 tbsp rice vinegar, 1 tsp sesame oil, 1 tsp grated ginger, 2 cloves garlic, 1 tsp cornstarch'], steps:['Make teriyaki sauce: combine all sauce ingredients in a saucepan. Bring to a boil over medium heat, stirring constantly, about 1 minute until thickened.','Pour 1/4 cup of the sauce over raw salmon fillets and marinate at least 20 minutes.','Cook jasmine rice per package instructions.','Preheat air fryer to 400°F. Spray basket, add salmon, and air fry 5-7 minutes until it flakes easily with a fork. (Or bake at 400°F for 7-9 minutes.)','Mix sriracha mayo: combine mayo with sriracha to taste.','Divide rice into bowls. Top with salmon, avocado, edamame, mango, and cucumber.','Drizzle remaining teriyaki sauce and sriracha mayo over top. Garnish with green onions and cilantro.'] },
  { id:'r3', name:'Burger, Potato Salad & Fries', emoji:'🍔', category:'American', time:'50 min', notes:'Perfect for grill nights', ingredients:['1.5 lbs ground beef (80/20)','4 brioche buns','Cheddar cheese slices','Lettuce, tomato, onion, pickles','Ketchup, mustard, mayo','4 russet potatoes (for fries)','Potato salad: 1.5 lbs red potatoes, 3 tbsp mayo, 1 tbsp mustard, 2 celery stalks, 1 small red onion, 2 hard-boiled eggs, salt & pepper','Olive oil, garlic powder, paprika, salt'], steps:['Boil red potatoes until tender, about 15 min. Let cool, then cut into chunks.','Make potato salad: combine potatoes, mayo, mustard, celery, red onion, and eggs. Season with salt and pepper. Refrigerate.','Cut russet potatoes into fry shapes. Toss with olive oil, garlic powder, paprika, and salt. Spread on a baking sheet.','Bake fries at 425°F for 30-35 minutes, flipping halfway, until golden and crispy.','Form ground beef into 4 patties, season generously with salt and pepper.','Grill or pan-cook patties 3-4 minutes per side. Add cheese in the last minute.','Toast buns. Assemble burgers with your preferred toppings. Serve alongside fries and potato salad.'] },
  { id:'r4', name:'Steak, Sweet Potato & Broccoli', emoji:'🥩', category:'American', time:'45 min', notes:'High protein, wholesome dinner', ingredients:['2 ribeye or NY strip steaks (about 10 oz each)','2 large sweet potatoes','2 heads broccoli, cut into florets','4 cups mixed greens','1 cup cherry tomatoes','1/4 cup red onion, thinly sliced','Salad dressing: 3 tbsp olive oil, 2 tbsp lemon juice, 1 tsp honey, salt & pepper','Butter, garlic cloves, fresh thyme (for steak)','Olive oil, salt, pepper, smoked paprika'], steps:['Preheat oven to 400°F. Pierce sweet potatoes, rub with oil and salt. Bake 40-45 minutes until tender.','Toss broccoli with olive oil, salt, and pepper. Roast on a baking sheet at 400°F for 20-25 minutes until edges are crispy.','Take steaks out 30 minutes before cooking. Pat dry and season generously with salt and pepper.','Heat a cast iron skillet until very hot. Add a drizzle of oil, sear steaks 3-4 minutes per side for medium-rare.','In the last minute, add butter, crushed garlic, and thyme. Baste steaks with the butter.','Rest steaks 5-10 minutes before slicing.','Make side salad: toss greens, cherry tomatoes, and red onion with lemon vinaigrette. Serve alongside.'] },
  { id:'r5', name:'Fish Tacos with Mango Salsa', emoji:'🐟', category:'Mexican', time:'35 min', notes:'Light and fresh, great for summer', ingredients:['1.5 lbs white fish (cod, tilapia, or mahi mahi)','8 small corn or flour tortillas','2 cups purple cabbage, shredded','1 lime','1/2 cup sour cream or Greek yogurt','Mango salsa: 2 mangos diced, 1/2 red onion diced, 1 jalapeño minced, juice of 2 limes, fresh cilantro, salt','Fish seasoning: 1 tsp cumin, 1 tsp chili powder, 1/2 tsp garlic powder, 1/2 tsp paprika, salt & pepper','Olive oil'], steps:['Make mango salsa: combine mango, red onion, jalapeño, lime juice, and cilantro. Season with salt. Set aside.','Pat fish dry. Season with cumin, chili powder, garlic powder, paprika, salt, and pepper.','Heat oil in a non-stick skillet over medium-high heat. Cook fish 3-4 minutes per side until flaky and golden.','Use a fork to gently break fish into chunks.','Warm tortillas in a dry skillet or over a gas burner for 30 seconds each.','Toss shredded cabbage with a squeeze of lime and a pinch of salt.','Assemble tacos: fish, cabbage, mango salsa, and a dollop of sour cream. Serve with lime wedges.'] },
  { id:'r6', name:'Buddha Bowl', emoji:'🥗', category:'Vegetarian', time:'40 min', notes:'Nutritious, plant-based, customizable', ingredients:['1 cup quinoa','1 can (15oz) chickpeas, drained and rinsed','2 sweet potatoes, cubed','2 cups kale or spinach','1 avocado, sliced','1/2 cup shredded red cabbage','1/2 cup shredded carrots','Tahini dressing: 2 tbsp tahini, 2 tbsp lemon juice, 1 clove garlic minced, 2-3 tbsp water, salt','Olive oil, cumin, smoked paprika, salt & pepper'], steps:['Preheat oven to 400°F. Toss sweet potato cubes with oil, cumin, paprika, salt. Toss chickpeas separately the same way.','Roast chickpeas 25-30 min until crispy. Roast sweet potatoes 25 min until tender.','Cook quinoa: rinse and combine with 2 cups water. Bring to a boil, reduce heat, cover, simmer 15 minutes. Fluff with a fork.','Make tahini dressing: whisk tahini, lemon juice, garlic, and enough water to reach a drizzleable consistency. Season with salt.','If using kale, massage with a little olive oil and lemon. Spinach can be used as-is.','Assemble bowls: quinoa base, then sweet potato, chickpeas, greens, cabbage, carrots, and avocado.','Drizzle generously with tahini dressing before serving.'] },
  { id:'r7', name:'Chicken Curry', emoji:'🍛', category:'Indian', time:'45 min', notes:'Serve with naan or basmati rice', ingredients:['2 lbs chicken thighs, cut into chunks','2 cups basmati rice','1 large onion, diced','4 cloves garlic, minced','1 tbsp fresh ginger, grated','1 can (14oz) diced tomatoes','1 can (14oz) coconut milk','2 tbsp curry powder','1 tsp turmeric','1 tsp garam masala','1/2 tsp cumin','Fresh cilantro and naan for serving','Coconut oil or butter, salt'], steps:['Cook basmati rice per package instructions.','Heat oil in a large pot or Dutch oven over medium heat. Sauté onion 5-7 minutes until softened.','Add garlic and ginger, cook 1 minute until fragrant.','Add curry powder, turmeric, cumin, and garam masala. Toast spices 30 seconds, stirring.','Add chicken, season with salt, cook 5 minutes stirring occasionally.','Pour in diced tomatoes and coconut milk. Stir to combine. Bring to a boil, then reduce heat and simmer 20-25 minutes until chicken is cooked through and sauce thickens.','Taste and adjust seasoning. Serve over basmati rice, garnished with cilantro and naan on the side.'] },
  { id:'r8', name:'Beef & Broccoli Stir Fry', emoji:'🥦', category:'Asian', time:'25 min', notes:'Better than takeout, ready in under 30 min', ingredients:['1.5 lbs flank steak, thinly sliced against the grain','4 cups broccoli florets','2 cups jasmine rice','3 cloves garlic, minced','1 tsp fresh ginger, grated','Sauce: 1/3 cup soy sauce, 2 tbsp oyster sauce, 1 tbsp brown sugar, 1 tsp sesame oil, 1 tsp cornstarch, 1/4 cup beef broth','Sesame seeds and sliced green onions to garnish','Vegetable oil'], steps:['Cook jasmine rice per package directions.','Slice flank steak very thin against the grain. Toss with 1 tbsp soy sauce and 1 tsp cornstarch.','Mix sauce: combine remaining soy sauce, oyster sauce, brown sugar, sesame oil, cornstarch, and beef broth. Set aside.','Heat 1 tbsp oil in a wok or large skillet over high heat. Stir fry broccoli 3-4 minutes until bright green and slightly tender. Remove from pan.','Add another tbsp of oil. Cook beef in a single layer 1-2 minutes without stirring, then stir fry 1-2 more minutes until browned.','Add garlic and ginger, stir fry 30 seconds.','Pour in sauce and return broccoli to pan. Toss everything together 1-2 minutes until sauce thickens. Serve over rice garnished with sesame seeds and green onions.'] },
  { id:'r9', name:'Ramen Bowl', emoji:'🍜', category:'Japanese', time:'60 min', notes:'Rich broth, perfect for cold nights', ingredients:['4 portions ramen noodles','4 eggs','1 lb pork belly or chicken breast','4 cups chicken or pork broth','2 cups water','3 tbsp soy sauce','1 tbsp white miso paste','1 tbsp sesame oil','2 cups bok choy or spinach','1 cup corn kernels','4 green onions, sliced','Nori sheets, sesame seeds for garnish','4 cloves garlic, 1 tbsp fresh ginger'], steps:['Soft-boil eggs: bring water to a boil, lower in eggs carefully, cook exactly 7 minutes. Transfer to ice bath. Peel when cool and halve.','Cook pork belly or chicken: season and sear in a pan over medium-high heat until cooked through. Rest and slice thin.','Make broth: combine broth, water, soy sauce, garlic, and ginger in a large pot. Bring to a gentle simmer for 15-20 minutes.','Remove garlic and ginger. Whisk in miso paste and sesame oil. Taste and adjust seasoning.','Cook ramen noodles per package directions. Drain.','Blanch bok choy in the hot broth for 1-2 minutes.','Assemble bowls: noodles first, then ladle broth. Arrange pork or chicken, egg halves, bok choy, and corn. Garnish with green onions, nori, and sesame seeds.'] },
  { id:'r10', name:'Pasta with Meat Sauce', emoji:'🍝', category:'Italian', time:'50 min', notes:'Classic Sunday dinner, great leftovers', ingredients:['1 lb spaghetti or rigatoni','1.5 lbs ground beef or Italian sausage','1 large onion, diced','4 cloves garlic, minced','1 can (28oz) crushed tomatoes','1 can (6oz) tomato paste','1/2 cup red wine (optional)','1 tsp dried oregano','1 tsp dried basil','1/2 tsp sugar','Parmesan cheese, fresh basil to serve','Olive oil, salt & pepper'], steps:['Heat oil in a large pot over medium heat. Sauté onion 5-7 minutes until softened.','Add garlic and cook 1 minute.','Add ground beef and cook, breaking it up, until browned. Drain excess fat.','If using, add red wine and let reduce 2-3 minutes.','Stir in tomato paste, crushed tomatoes, oregano, basil, and sugar. Season with salt and pepper.','Simmer sauce on low for 25-30 minutes, stirring occasionally, until rich and thick.','Cook pasta in well-salted boiling water until al dente. Reserve 1/2 cup pasta water before draining.','Toss pasta with sauce, adding a splash of pasta water if needed. Serve topped with Parmesan and fresh basil.'] }
];

const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function loadRecipes() {
  try { const s = localStorage.getItem('ourKitchenRecipes'); return s ? JSON.parse(s) : null; } catch(e) { return null; }
}
function saveRecipesToStorage(r) { localStorage.setItem('ourKitchenRecipes', JSON.stringify(r)); }
function loadWeek() { try { const s = localStorage.getItem('ourKitchenWeek'); return s ? JSON.parse(s) : {}; } catch(e) { return {}; } }
function saveWeekToStorage(w) { localStorage.setItem('ourKitchenWeek', JSON.stringify(w)); }
function loadChecked() { try { const s = localStorage.getItem('ourKitchenChecked'); return s ? JSON.parse(s) : {}; } catch(e) { return {}; } }
function saveCheckedToStorage(c) { localStorage.setItem('ourKitchenChecked', JSON.stringify(c)); }

let recipes = loadRecipes() || (saveRecipesToStorage(DEFAULT_RECIPES), DEFAULT_RECIPES);
let week = loadWeek();
let checkedItems = loadChecked();

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-btn')[['library','planner','grocery','add'].indexOf(id)].classList.add('active');
  if (id === 'library') renderLibrary();
  if (id === 'planner') renderPlanner();
  if (id === 'grocery') renderGroceryPage();
  if (id === 'add') initAddForm(null);
}

function renderLibrary() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const filtered = recipes.filter(r => r.name.toLowerCase().includes(q) || (r.category||'').toLowerCase().includes(q));
  document.getElementById('recipe-count-label').textContent = filtered.length + ' recipe' + (filtered.length !== 1 ? 's' : '');
  const grid = document.getElementById('recipe-grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">🔍</div><h3>No recipes found</h3><p>Try a different search or add a new recipe.</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(r => `
    <div class="recipe-card">
      <div class="recipe-card-emoji">${r.emoji||'🍽️'}</div>
      <div class="recipe-card-name">${r.name}</div>
      <div class="recipe-card-meta">
        ${r.category ? '<span class="tag">'+r.category+'</span>' : ''}
        ${r.time ? '<span class="tag terracotta">⏱ '+r.time+'</span>' : ''}
      </div>
      ${r.notes ? '<div style="font-size:0.78rem;color:var(--ink-soft);line-height:1.4">'+r.notes+'</div>' : ''}
      <div class="recipe-card-actions">
        <button class="btn-sm" onclick="openRecipe('${r.id}')">View Recipe</button>
        <button class="btn-sm" onclick="editRecipe('${r.id}')">Edit</button>
      </div>
    </div>
  `).join('');
}

function openRecipe(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-emoji">${r.emoji||'🍽️'}</div>
    <div class="modal-title">${r.name}</div>
    <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
      ${r.category ? '<span class="tag">'+r.category+'</span>' : ''}
      ${r.time ? '<span class="tag terracotta">⏱ '+r.time+'</span>' : ''}
    </div>
    ${r.notes ? '<div style="margin-top:12px;font-size:0.85rem;color:var(--ink-mid);font-style:italic">'+r.notes+'</div>' : ''}
    ${r.ingredients && r.ingredients.length ? '<div class="modal-section"><div class="modal-section-title">Ingredients</div><ul class="ingredient-list">'+r.ingredients.map(i=>'<li>'+i+'</li>').join('')+'</ul></div>' : ''}
    ${r.steps && r.steps.length ? '<div class="modal-section"><div class="modal-section-title">Instructions</div><ol class="step-list">'+r.steps.map(s=>'<li>'+s+'</li>').join('')+'</ol></div>' : ''}
    <div style="margin-top:1.5rem;display:flex;gap:0.75rem">
      <button class="btn-primary" onclick="closeModalDirect();editRecipe('${r.id}')">Edit Recipe</button>
      <button class="btn-secondary" onclick="closeModalDirect()">Close</button>
    </div>
  `;
  document.getElementById('recipe-modal').classList.add('open');
}
function closeModal(e) { if (e.target.id === 'recipe-modal') closeModalDirect(); }
function closeModalDirect() { document.getElementById('recipe-modal').classList.remove('open'); }

function renderPlanner() {
  const opts = '<option value="">— No meal planned —</option>' + recipes.map(r => '<option value="'+r.id+'">'+r.emoji+' '+r.name+'</option>').join('');
  document.getElementById('week-slots').innerHTML = DAYS.map(day => `
    <div class="day-row ${week[day] ? 'has-recipe' : ''}" id="row-${day}">
      <div class="day-label">${day}</div>
      <select class="day-select" onchange="setDay('${day}', this.value)">${opts}</select>
      <button class="day-view-btn" onclick="viewDayRecipe('${day}')" title="View recipe">👁</button>
    </div>
  `).join('');
  DAYS.forEach(day => {
    const sel = document.querySelector('#row-'+day+' select');
    if (sel) sel.value = week[day] || '';
  });
  renderGroceryMini();
}

function setDay(day, id) {
  week[day] = id;
  saveWeekToStorage(week);
  const row = document.getElementById('row-'+day);
  if (row) row.className = 'day-row' + (id ? ' has-recipe' : '');
  renderGroceryMini();
}
function viewDayRecipe(day) {
  if (!week[day]) { showToast('No recipe selected for ' + day); return; }
  openRecipe(week[day]);
}
function clearWeek() {
  DAYS.forEach(d => week[d] = '');
  saveWeekToStorage(week);
  checkedItems = {};
  saveCheckedToStorage(checkedItems);
  renderPlanner();
  showToast('Week cleared!');
}

function getGroceryItems() {
  const items = [];
  DAYS.forEach(day => {
    if (!week[day]) return;
    const r = recipes.find(x => x.id === week[day]);
    if (r && r.ingredients) r.ingredients.forEach(ing => items.push({ text: ing, recipe: r.name }));
  });
  return items;
}

function renderGroceryMini() {
  const items = getGroceryItems();
  const badge = document.getElementById('grocery-count-badge');
  if (badge) badge.textContent = items.length;
  const mini = document.getElementById('grocery-mini-list');
  if (!mini) return;
  if (!items.length) {
    mini.innerHTML = '<div class="grocery-empty">Select meals above and your grocery list will appear here automatically.</div>';
    return;
  }
  const shown = items.slice(0, 8);
  mini.innerHTML = shown.map(item => `
    <div class="grocery-item ${checkedItems[item.text] ? 'checked' : ''}" onclick="toggleCheck(this, '${item.text.replace(/'/g,"\\'")}')">
      <div class="grocery-check">${checkedItems[item.text] ? '✓' : ''}</div>
      <span>${item.text}</span>
    </div>
  `).join('') + (items.length > 8 ? '<div style="font-size:0.8rem;color:var(--ink-soft);padding:6px 0">+' + (items.length-8) + ' more items...</div>' : '');
}

function renderGroceryPage() {
  const items = getGroceryItems();
  const selectedNames = [...new Set(DAYS.filter(d => week[d]).map(d => { const r = recipes.find(x => x.id === week[d]); return r ? r.name : ''; }))].filter(Boolean);
  document.getElementById('grocery-week-summary').textContent = selectedNames.length ? 'For: ' + selectedNames.join(', ') : 'No meals planned yet';
  const el = document.getElementById('grocery-full-content');
  if (!items.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🛒</div><h3>No groceries yet</h3><p>Go to "This Week" and select your meals first.<br>Your shopping list will appear here automatically.</p><br><button class="btn-primary" onclick="showPage(\'planner\')">Plan This Week →</button></div>';
    return;
  }
  const byRecipe = {};
  items.forEach(item => { if (!byRecipe[item.recipe]) byRecipe[item.recipe] = []; byRecipe[item.recipe].push(item.text); });
  const unchecked = items.filter(i => !checkedItems[i.text]).length;
  el.innerHTML = `
    <div style="display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center">
      <div style="font-size:0.9rem;color:var(--ink-mid)">${unchecked} of ${items.length} items remaining</div>
      <button class="btn-secondary" onclick="clearChecked()" style="font-size:0.8rem;padding:6px 12px">Uncheck All</button>
    </div>
    ${Object.entries(byRecipe).map(([name, ings]) => `
      <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:1rem">
        <div style="font-weight:500;font-size:0.95rem;margin-bottom:0.75rem;padding-bottom:8px;border-bottom:1px solid var(--border)">${name}</div>
        ${ings.map(ing => `<div class="grocery-item ${checkedItems[ing] ? 'checked' : ''}" onclick="toggleCheck(this, '${ing.replace(/'/g,"\\'")}');renderGroceryPage()"><div class="grocery-check">${checkedItems[ing] ? '✓' : ''}</div><span>${ing}</span></div>`).join('')}
      </div>
    `).join('')}
  `;
}

function toggleCheck(el, text) {
  checkedItems[text] = !checkedItems[text];
  saveCheckedToStorage(checkedItems);
}
function clearChecked() {
  checkedItems = {};
  saveCheckedToStorage(checkedItems);
  renderGroceryPage();
}
function printGrocery() {
  const items = getGroceryItems();
  if (!items.length) { showToast('No groceries to print!'); return; }
  const win = window.open('', '_blank');
  win.document.write('<html><head><title>Grocery List - Our Kitchen</title><style>body{font-family:sans-serif;padding:2rem;max-width:500px}h1{margin-bottom:1rem}h3{margin:1.5rem 0 0.5rem;font-size:1rem;color:#555;border-bottom:1px solid #ddd;padding-bottom:4px}li{padding:5px 0;font-size:0.95rem}</style></head><body><h1>🛒 Grocery List</h1>');
  const byRecipe = {};
  items.forEach(i => { if (!byRecipe[i.recipe]) byRecipe[i.recipe] = []; byRecipe[i.recipe].push(i.text); });
  Object.entries(byRecipe).forEach(([name, ings]) => {
    win.document.write('<h3>' + name + '</h3><ul>' + ings.map(i => '<li>' + i + '</li>').join('') + '</ul>');
  });
  win.document.write('</body></html>');
  win.print();
}

function initAddForm(recipe) {
  document.getElementById('form-page-title').textContent = recipe ? 'Edit Recipe' : 'Add a Recipe';
  document.getElementById('delete-btn').style.display = recipe ? 'inline-block' : 'none';
  document.getElementById('edit-id').value = recipe ? recipe.id : '';
  document.getElementById('f-name').value = recipe ? recipe.name : '';
  document.getElementById('f-emoji').value = recipe ? (recipe.emoji || '') : '';
  document.getElementById('f-category').value = recipe ? (recipe.category || '') : '';
  document.getElementById('f-time').value = recipe ? (recipe.time || '') : '';
  document.getElementById('f-notes').value = recipe ? (recipe.notes || '') : '';
  document.getElementById('ingredients-list').innerHTML = '';
  (recipe ? recipe.ingredients : ['']).forEach(v => addIngredient(v));
  document.getElementById('steps-list').innerHTML = '';
  (recipe ? recipe.steps : ['']).forEach(v => addStep(v));
}
function addIngredient(val) {
  const div = document.createElement('div');
  div.className = 'dynamic-item';
  div.innerHTML = '<input type="text" placeholder="e.g. 2 cups chicken broth"><button class="remove-btn" onclick="this.parentElement.remove()">×</button>';
  div.querySelector('input').value = val || '';
  document.getElementById('ingredients-list').appendChild(div);
}
function addStep(val) {
  const div = document.createElement('div');
  div.className = 'dynamic-item';
  div.innerHTML = '<textarea placeholder="Describe this step..." style="min-height:60px"></textarea><button class="remove-btn" onclick="this.parentElement.remove()" style="align-self:flex-start;margin-top:4px">×</button>';
  div.querySelector('textarea').value = val || '';
  document.getElementById('steps-list').appendChild(div);
}
function saveRecipe() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Please enter a recipe name'); return; }
  const ingredients = Array.from(document.querySelectorAll('#ingredients-list input')).map(i => i.value.trim()).filter(Boolean);
  const steps = Array.from(document.querySelectorAll('#steps-list textarea')).map(t => t.value.trim()).filter(Boolean);
  const recipe = {
    id: document.getElementById('edit-id').value || 'r' + Date.now(),
    name, emoji: document.getElementById('f-emoji').value || '🍽️',
    category: document.getElementById('f-category').value.trim(),
    time: document.getElementById('f-time').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    ingredients, steps
  };
  const idx = recipes.findIndex(r => r.id === recipe.id);
  if (idx >= 0) recipes[idx] = recipe; else recipes.push(recipe);
  saveRecipesToStorage(recipes);
  showToast(idx >= 0 ? 'Recipe updated!' : 'Recipe added!');
  showPage('library');
}
function editRecipe(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-add').classList.add('active');
  document.querySelectorAll('.nav-btn')[3].classList.add('active');
  initAddForm(r);
}
function deleteRecipe() {
  const id = document.getElementById('edit-id').value;
  if (!id || !confirm('Delete this recipe? This cannot be undone.')) return;
  recipes = recipes.filter(r => r.id !== id);
  DAYS.forEach(d => { if (week[d] === id) week[d] = ''; });
  saveRecipesToStorage(recipes);
  saveWeekToStorage(week);
  showToast('Recipe deleted');
  showPage('library');
}
function cancelEdit() { showPage('library'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

renderLibrary();
</script>
</body>
</html>
